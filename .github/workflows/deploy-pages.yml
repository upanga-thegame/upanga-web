name: Deploy Upanga Webpage

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "styles.css"
      - "script.js"
      - "docs/TODO.MD"
      - "scripts/**"
      - "assets/**"
      - "images/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate Dev Tracker Data
        run: node scripts/generate-dev-tracker.mjs

      - name: Prepare Deployment Artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp styles.css dist/
          cp script.js dist/
          if [ -d "data" ]; then cp -r data dist/data; fi
          if [ -d "assets" ]; then cp -r assets dist/assets; fi
          if [ -d "images" ]; then cp -r images dist/images; fi
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
